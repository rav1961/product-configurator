services:

  nginx:
    image: nginx:1.29-alpine
    container_name: configurator-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
    container_name: configurator-php
    restart: unless-stopped
    working_dir: /var/www/backend
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
      - redis
      - rabbitmq

  node:
    image: node:24-alpine
    container_name: configurator-node
    working_dir: /var/www/frontend
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
    tty: true

  postgres:
    image: postgres:17
    container_name: configurator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: configurator
      POSTGRES_USER: configurator
      POSTGRES_PASSWORD: configurator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: configurator-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis:
    image: redis:8-alpine
    container_name: configurator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: configurator-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  mailpit:
    image: axllent/mailpit
    container_name: configurator-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data: